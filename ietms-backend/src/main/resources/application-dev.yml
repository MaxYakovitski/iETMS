server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ietms
    username: ietms_user
    password: ietms
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.web.socket: DEBUG
    org.springframework.web.socket.server: DEBUG
    org.springframework.web.socket.messaging: DEBUG
    org.springframework.security: DEBUG

app:
  ws:
    allowed-origins: http://localhost:*,http://127.0.0.1:*
  jwt:
    # DEV ONLY — never use this value in production
    secret: ${JWT_SECRET:dev-only-jwt-secret-replace-in-production-env}
  admin:
    first-name: system
    last-name: administrator
    email: ${ADMIN_EMAIL:a@example.com}
    password: ${ADMIN_PASSWORD:dev-admin-password}