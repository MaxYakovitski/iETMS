name: Backend Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'ietms-desktop/**'
      - 'ietms-desktop-updater/**'
      - '.github/workflows/desktop-*.yml'
      - '.github/workflows/desktop-ci.yml'
      - '.github/workflows/desktop*.yml'
      - 'docs/**'
      - 'README.md'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        run: mvn -B -pl ietms-backend -am clean package -DskipTests

      - name: Prepare backend jar
        run: |
          mv ietms-backend/target/ietms-backend-*.jar ietms-backend/target/ietms-backend.jar

      - name: Upload jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "ietms-backend/target/ietms-backend.jar"
          target: "/opt/ietms/backend/app/"
          strip_components: 2

      - name: Restart backend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo -n /usr/bin/systemctl restart ietms-backend

      - name: Wait for backend health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in {1..30}; do
              if curl -sf http://localhost:8080/actuator/health | grep '"status":"UP"'; then
                echo "Backend is UP"
                exit 0
              fi
              sleep 3
            done
            echo "Backend did not start"
            exit 1