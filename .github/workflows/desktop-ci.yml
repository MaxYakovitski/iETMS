name: Desktop MSI Build

on:
  workflow_dispatch:
  push:
    tags:
      - desktop-v*

permissions:
  contents: write

jobs:
  build-windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest

    env:
      APP_NAME: iETMS
      APP_VERSION: ${{ github.ref_name }}
      BACKEND_URL: https://ietms.app
      BACKEND_WS_URL: wss://ietms.app/ws
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      # 1. Checkout sources
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3. Extract version from tag (desktop-vX.Y.Z → X.Y.Z)
      - name: Extract app version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#desktop-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Desktop version: $VERSION"

      # 4. Build full desktop + updater + MSI
      - name: Build Desktop MSI
        shell: bash
        run: |
          mvn clean package \
            -Pwindows-installer \
            -Pwindows-updater-image \
            -DskipTests \
            -Dapp.version=${{ steps.version.outputs.version }} \
            -Dspring.profiles.active=prod \
            -Dbackend.base-url=${{ env.BACKEND_URL }} \
            -Dbackend.ws-url=${{ env.BACKEND_WS_URL }} \
            -Dslack.webhook-url=${{ secrets.SLACK_WEBHOOK_URL }}

      # 5. Locate MSI
      - name: Locate MSI
        id: msi
        shell: bash
        run: |
          MSI=$(ls ietms-desktop/target/installer/*.msi)
          echo "file=$MSI" >> $GITHUB_OUTPUT
          echo "MSI found: $MSI"

      # 6. Calculate checksum & size
      - name: Calculate checksum & size
        id: meta
        shell: bash
        run: |
          FILE="${{ steps.msi.outputs.file }}"
          SHA=$(sha256sum "$FILE" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$FILE" || stat -f%z "$FILE")
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      # 7. Upload MSI as workflow artifact
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: iETMS-msi
          path: ietms-desktop/target/installer/*.msi

      # 8. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}
          name: iETMS Desktop ${{ steps.version.outputs.version }}
          files: |
            ${{ steps.msi.outputs.file }}

      # 9. Checkout updates repository
      - name: Checkout updates repository
        uses: actions/checkout@v4
        with:
          repository: MaxYakovitski/iETMS-updates
          path: updates
          token: ${{ secrets.UPDATES_REPO_TOKEN }}

      # 10. Update Windows manifest.json
      - name: Update manifest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.meta.outputs.sha256 }}"
          SIZE="${{ steps.meta.outputs.size }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p updates/windows

          cat > updates/windows/manifest.json <<EOF
          {
            "app": "iETMS-desktop",
            "platform": "windows",
            "latestVersion": "$VERSION",
            "mandatory": true,
            "releaseDate": "$DATE",
            "download": {
              "type": "msi",
              "url": "https://github.com/${{ github.repository }}/releases/download/desktop-v$VERSION/iETMS-$VERSION.msi",
              "sha256": "$SHA",
              "size": $SIZE
            },
            "notes": "Desktop release $VERSION"
          }
          EOF

      - name: Commit and push manifest.json
        working-directory: updates
        shell: bash
        run: |
          git config user.name "iETMS CI"
          git config user.email "ci@ietms.local"

          git add windows/manifest.json

          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "Update Windows manifest to ${{ steps.version.outputs.version }}"
            git push origin main
          fi