name: Desktop MSI Build

on:
  workflow_dispatch:
  push:
    tags:
      - desktop-v*

permissions:
  contents: write

jobs:
  build-windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest

    env:
      APP_NAME: iETMS
      APP_VERSION: ${{ github.ref_name }}
      BACKEND_URL: http://165.22.92.183:8080
      BACKEND_WS_URL: ws://165.22.92.183:8080/ws

    steps:
      # 1. Checkout sources
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3. Build updater EXE (production-grade)
      - name: Build Updater EXE
        shell: bash
        run: |
          mvn -pl iet-desktop-updater \
              -Pwindows-updater-image \
              clean package \
              -DskipTests

      # 3.1 Copy updater app-image into desktop jpackage input
      - name: Copy Updater into Desktop Image
        shell: bash
        run: |
          mkdir -p iet-desktop/target/jpackage-input/app/updater
          cp -r iet-desktop-updater/target/updater-image/iETMS-Updater/* \
                iet-desktop/target/jpackage-input/app/updater/

      # 4. Extract version from tag (desktop-vX.Y.Z → X.Y.Z)
      - name: Extract app version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#desktop-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Desktop version: $VERSION"

      # 5. Build MSI via Maven + jpackage
      - name: Build Desktop MSI
        shell: bash
        run: |
          mvn package \
            -Pwindows-installer \
            -DskipTests \
            -Dapp.version=${{ steps.version.outputs.version }} \
            -Dspring.profiles.active=prod \
            -Dbackend.base-url=${{ env.BACKEND_URL }} \
            -Dbackend.ws-url=${{ env.BACKEND_WS_URL }}

      # 6. Locate MSI (ВАЖНА: installer/)
      - name: Locate MSI
        id: msi
        shell: bash
        run: |
          MSI=$(ls iet-desktop/target/installer/*.msi)
          echo "file=$MSI" >> $GITHUB_OUTPUT
          echo "MSI found: $MSI"

      # 7. Calculate checksum & size
      - name: Calculate checksum & size
        id: meta
        shell: bash
        run: |
          FILE="${{ steps.msi.outputs.file }}"
          SHA=$(sha256sum "$FILE" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$FILE" || stat -f%z "$FILE")
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      # 8. Upload MSI as workflow artifact
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: iETMS-msi
          path: iet-desktop/target/installer/*.msi

      # 9. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}
          name: iETMS Desktop ${{ steps.version.outputs.version }}
          files: |
            ${{ steps.msi.outputs.file }}

      # 10. Checkout updates repository
      - name: Checkout updates repository
        uses: actions/checkout@v4
        with:
          repository: MaxYakovitski/iETMS-updates
          path: updates
          token: ${{ secrets.UPDATES_REPO_TOKEN }}

      # 11. Update Windows manifest.json
      - name: Update manifest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.meta.outputs.sha256 }}"
          SIZE="${{ steps.meta.outputs.size }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p updates/windows

          cat > updates/windows/manifest.json <<EOF
          {
            "app": "iETMS-desktop",
            "platform": "windows",
            "latestVersion": "$VERSION",
            "mandatory": true,
            "releaseDate": "$DATE",
            "download": {
              "type": "msi",
              "url": "https://github.com/${{ github.repository }}/releases/download/desktop-v$VERSION/iETMS-$VERSION.msi",
              "sha256": "$SHA",
              "size": $SIZE
            },
            "notes": "Desktop release $VERSION"
          }
          EOF

      - name: Commit and push manifest.json
        working-directory: updates
        shell: bash
        run: |
          git config user.name "iETMS CI"
          git config user.email "ci@ietms.local"

          git add windows/manifest.json

          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "Update Windows manifest to ${{ steps.version.outputs.version }}"
            git push origin main
          fi