name: Desktop CI (MSI)

on:
  push:
    tags:
      - desktop-v*

jobs:
  build-windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#desktop-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Desktop version: $VERSION"

      - name: Build desktop JAR
        run: |
          mvn -B -pl iet-desktop -am clean package \
            -Pwindows-installer \
            -Dapp.version=${{ steps.version.outputs.version }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: iETMS-desktop-${{ steps.version.outputs.version }}-msi
          path: |
            iet-desktop/target/*.msi